<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berkay Taşkan - Bayram Harçlığı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .card-anim { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-anim:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-200 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-600 rounded-full shadow-lg mb-4 ring-4 ring-white">
                <i data-lucide="gift" class="text-white w-10 h-10"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">İyi Bayramlar! 🍬</h1>
            <div class="mt-4 inline-block px-4 py-1.5 bg-white shadow-sm rounded-full border border-slate-200">
                <div class="flex items-center space-x-2">
                    <i data-lucide="user" class="w-4 h-4 text-indigo-500"></i>
                    <span class="text-slate-700 font-semibold tracking-wide">Berkay Taşkan</span>
                </div>
            </div>
        </div>

        <div class="space-y-5">
            
            <div class="card-anim glass-effect rounded-[2.5rem] p-6 border border-white shadow-xl">
                <div class="flex items-center justify-between mb-5">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center shadow-lg shadow-red-200">
                            <i data-lucide="landmark" class="text-white w-6 h-6"></i>
                        </div>
                        <div>
                            <h2 class="font-bold text-slate-800">Ziraat Bankası</h2>
                            <p class="text-[10px] text-red-600 font-bold uppercase tracking-widest leading-none"></p>
                        </div>
                    </div>
                </div>

                <div class="relative group cursor-pointer" onclick="copyToClipboard('ziraatIban', 'ziraatBtn')">
                    <div class="bg-slate-100/50 rounded-2xl p-4 border border-slate-200/60 group-hover:bg-indigo-50 group-hover:border-indigo-200 transition-all">
                        <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">IBAN Numarası</p>
                        <p id="ziraatIban" class="text-slate-800 font-mono text-sm sm:text-base font-semibold tracking-tighter">TR03 0001 0090 1019 7947 4050 01</p>
                    </div>
                    <button id="ziraatBtn" class="mt-3 w-full bg-slate-900 text-white text-sm font-bold py-3.5 rounded-2xl flex items-center justify-center space-x-2 hover:bg-black transition-all">
                        <i data-lucide="copy" class="w-4 h-4 text-indigo-300"></i>
                        <span>Kopyalamak için Tıkla</span>
                    </button>
                </div>
            </div>

            <div class="card-anim glass-effect rounded-[2.5rem] p-6 border border-white shadow-xl">
                <div class="flex items-center justify-between mb-5">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-200">
                            <i data-lucide="credit-card" class="text-white w-6 h-6"></i>
                        </div>
                        <div>
                            <h2 class="font-bold text-slate-800">Garanti BBVA</h2>
                            <p class="text-[10px] text-emerald-600 font-bold uppercase tracking-widest leading-none"></p>
                        </div>
                    </div>
                </div>

                <div class="relative group cursor-pointer" onclick="copyToClipboard('garantiIban', 'garantiBtn')">
                    <div class="bg-slate-100/50 rounded-2xl p-4 border border-slate-200/60 group-hover:bg-indigo-50 group-hover:border-indigo-200 transition-all">
                        <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">IBAN Numarası</p>
                        <p id="garantiIban" class="text-slate-800 font-mono text-sm sm:text-base font-semibold tracking-tighter">TR36 0006 2000 0530 0006 8912 70</p>
                    </div>
                    <button id="garantiBtn" class="mt-3 w-full bg-slate-900 text-white text-sm font-bold py-3.5 rounded-2xl flex items-center justify-center space-x-2 hover:bg-black transition-all">
                        <i data-lucide="copy" class="w-4 h-4 text-emerald-300"></i>
                        <span>Kopyalamak için Tıkla</span>
                    </button>
                </div>
            </div>

        </div>

        <footer class="mt-10 text-center">
            <p class="text-slate-500 text-sm font-medium italic">"Güzellikler paylaştıkça çoğalır."</p>
            <div class="flex justify-center space-x-2 mt-4 opacity-40 hover:opacity-100 transition-opacity">
                <i data-lucide="sparkles" class="w-4 h-4 text-indigo-500"></i>
                <span class="text-[10px] font-bold tracking-[0.2em] text-slate-600 uppercase">berkaytdev.com</span>
                <i data-lucide="sparkles" class="w-4 h-4 text-indigo-500"></i>
            </div>
        </footer>
    </div>

    <script>
        lucide.createIcons();

        function copyToClipboard(elementId, btnId) {
            const ibanText = document.getElementById(elementId).innerText.replace(/\s/g, '');
            const btn = document.getElementById(btnId);
            const originalContent = btn.innerHTML;

            navigator.clipboard.writeText(ibanText).then(() => {
                btn.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i><span class="text-green-400">Başarıyla Kopyalandı!</span>`;
                btn.classList.add('ring-2', 'ring-green-500/20');
                lucide.createIcons();

                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.remove('ring-2', 'ring-green-500/20');
                    lucide.createIcons();
                }, 2000);
            });
        }
    </script>
</body>
</html>
