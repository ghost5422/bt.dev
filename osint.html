<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO-INT v13.0 | OPERATIONAL DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="osint.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
</head>
<body class="bg-[#050505] text-white overflow-hidden font-mono text-xs selection:bg-red-600 selection:text-white">

    <div class="scanlines"></div>
    <div id="map" class="w-full h-screen z-0"></div>

    <div class="absolute inset-0 pointer-events-none z-10 flex flex-col justify-between p-4">
        
        <header class="flex justify-between items-start pointer-events-auto gap-4">
            <div class="glass-panel p-4 border-l-4 border-red-600 min-w-[320px]">
                <h1 class="text-2xl font-black tracking-widest text-red-600 italic">GEO-INT v13.0</h1>
                <p class="text-[10px] text-gray-400 uppercase">Operator: Berkay_Dev // Tactical_Node_01</p>
            </div>

            <div class="flex-1 max-w-xl">
                <div class="glass-panel p-2 flex gap-2 border-b-2 border-cyan-500 shadow-[0_0_20px_rgba(6,182,212,0.2)]">
                    <input type="text" id="searchInput" placeholder="ADRES, KOORDİNAT VEYA UÇUŞ KODU SORGULA..." class="bg-transparent border-none text-cyan-400 text-xs p-2.5 w-full focus:outline-none placeholder:text-cyan-900">
                    <button onclick="searchLocation()" class="bg-cyan-900/30 px-6 text-cyan-400 hover:bg-cyan-500 hover:text-black transition-all font-black uppercase">Sorgula</button>
                </div>
            </div>
            
            <div class="glass-panel p-3 text-right min-w-[150px]">
                <div id="sysTime" class="text-2xl font-bold text-white tracking-tighter">00:00:00</div>
                <div id="gpsStatus" class="text-[9px] text-green-500 animate-pulse uppercase tracking-widest">GPS_LOCKED</div>
            </div>
        </header>

        <aside class="absolute top-32 left-4 pointer-events-auto space-y-4 w-80">
            <div class="glass-panel p-4 border-t-2 border-green-500">
                <h3 class="text-[10px] font-black text-green-500 mb-3 tracking-[3px] uppercase italic flex items-center gap-2">
                    <i class="fas fa-satellite-dish"></i> Kayıtlı Hedefler
                </h3>
                <div id="deviceList" class="space-y-2.5 max-h-[350px] overflow-y-auto pr-2 scrollbar-hide">
                    <div class="text-gray-600 italic text-center py-4">Sinyal bekleniyor...</div>
                </div>
                <button onclick="generateTrackingLink()" class="mt-4 w-full bg-green-900/10 border border-green-500 p-2.5 text-[10px] hover:bg-green-500 hover:text-black transition-all font-black uppercase">Yeni Takip Linki</button>
            </div>

            <div class="glass-panel p-3 border-t-2 border-cyan-500">
                <button onclick="getMyLocation()" class="w-full bg-cyan-900/20 border border-cyan-500 p-2.5 text-[10px] hover:bg-cyan-500 hover:text-black transition-all font-black uppercase tracking-widest flex items-center justify-center gap-2">
                    <i class="fas fa-crosshairs"></i> Konumumu Bul
                </button>
            </div>
        </aside>

        <aside class="absolute top-32 right-4 pointer-events-auto w-52 space-y-3">
            <div class="glass-panel p-4 border-t-2 border-red-600">
                <h3 class="text-[9px] font-black text-red-500 mb-4 uppercase italic text-center underline tracking-widest">Modül Kontrol</h3>
                <div class="space-y-2">
                    <button onclick="toggleLayer('traffic')" id="btn-traffic" class="ctrl-btn active">TRAFİK AKIŞI</button>
                    <button onclick="toggleLayer('flights')" id="btn-flights" class="ctrl-btn">HAVA SAHASI</button>
                    <button onclick="toggleLayer('ships')" id="btn-ships" class="ctrl-btn">DENİZ TRAFİĞİ</button>
                    <button onclick="toggleLayer('iss')" id="btn-iss" class="ctrl-btn active">UYDU (ISS)</button>
                    <button onclick="location.reload()" class="ctrl-btn text-red-500 border-red-900 font-black text-center mt-4">RESET</button>
                </div>
            </div>
            
            <div class="glass-panel p-3 border-t-2 border-amber-600 h-48 overflow-hidden flex flex-col">
                <h3 class="text-[8px] font-black text-amber-500 mb-2 uppercase italic text-center"><i class="fas fa-rss mr-1"></i> Haber Akışı</h3>
                <div id="newsTicker" class="space-y-2 overflow-y-auto scrollbar-hide flex-1 text-[9px] font-mono leading-tight">
                    <div class="text-gray-500 italic">Haberler yükleniyor...</div>
                </div>
            </div>
        </aside>

        <footer class="flex justify-between items-end pointer-events-auto gap-4">
            <div class="glass-panel w-full md:w-1/2 p-3">
                <div class="text-[8px] font-bold text-red-600 mb-1">LIVE_TELEMETRY_STREAM:</div>
                <div id="dataFeed" class="text-[9px] h-20 overflow-y-auto space-y-1 scrollbar-hide font-mono"></div>
            </div>
        </footer>
    </div>

    <div id="linkModal" class="absolute inset-0 z-[2000] bg-black/95 hidden flex items-center justify-center pointer-events-auto">
        <div class="glass-panel p-8 max-w-lg w-full border-2 border-green-500 text-center">
            <h2 class="text-green-500 font-bold mb-5 italic text-sm underline tracking-[4px]">TRACKING_LINK_GENERATED</h2>
            <input type="text" id="generatedLink" readonly class="w-full bg-black p-4 text-[11px] text-green-400 border border-green-900 mb-6 text-center">
            <button onclick="document.getElementById('linkModal').classList.add('hidden')" class="w-full border border-green-500 p-3 text-xs hover:bg-green-500 hover:text-black transition-all font-bold">KAPAT</button>
        </div>
    </div>

    <div id="tacticModal" class="absolute inset-0 z-[3000] bg-black/95 hidden flex items-center justify-center pointer-events-auto">
        <div class="glass-panel p-8 max-w-sm w-full border-2 border-red-600 text-center space-y-5">
            <div class="text-red-600 text-4xl"><i id="modalIcon" class="fas fa-exclamation-triangle"></i></div>
            <h2 id="modalTitle" class="text-red-500 font-black italic text-[10px] uppercase tracking-[3px]">SİSTEM UYARISI</h2>
            <p id="modalMsg" class="text-[12px] text-white font-mono leading-relaxed"></p>
            <div id="modalButtons" class="flex gap-4 justify-center pt-3"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="osint.js"></script>
</body>
</html>
