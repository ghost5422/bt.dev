<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vardiya Tablosu - Minimal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #111827; }
        
        /* Minimalist Vardiya Renkleri (Siyah Yazı) */
        .shift-pill {
            display: inline-block;
            width: 100%;
            max-width: 75px;
            padding: 6px 0;
            border-radius: 6px;
            font-weight: 700;
            color: #000000; /* Yazılar simsiyah */
            text-align: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.1s ease-in-out;
            font-size: 13px;
        }
        .shift-pill:active { transform: scale(0.95); }
        
        /* Renk Paleti */
        .GECE { background-color: #fecaca; } /* Açık Kırmızı */
        .SABAH { background-color: #bfdbfe; } /* Açık Mavi */
        .İZİN { background-color: #bbf7d0; } /* Açık Yeşil */

        /* Çıktıda Kesin 1 Sayfa - Ölçek Derdine Son */
        @media print {
            @page { 
                size: A4 portrait; 
                margin: 5mm !important; 
            }
            body { 
                background: white !important; 
                padding: 0 !important; 
                margin: 0 !important; 
                -webkit-print-color-adjust: exact !important; /* Arka plan renklerini zorla bastırır */
                print-color-adjust: exact !important;
            }
            .no-print { display: none !important; }
            .print-container { 
                box-shadow: none !important; 
                padding: 0 !important; 
                margin: 0 !important; 
                width: 100% !important; 
            }
            
            /* Başlığı iyice daralttık ki yer açsın */
            .header-area { padding-bottom: 4px !important; margin-bottom: 4px !important; border-bottom: 1px solid #e5e7eb !important; }
            h1 { font-size: 14pt !important; margin: 0 !important; }
            p.subtitle { font-size: 8pt !important; margin: 0 !important; }
            
            /* Tablo hücrelerini milimetrik sıfırladık */
            table { width: 100% !important; border-collapse: collapse !important; }
            th { font-size: 9pt !important; padding: 2px !important; border-bottom: 2px solid #000 !important; color: #000 !important; }
            td { 
                padding: 2px !important; /* Hücre boşluklarını yok ettik */
                height: 24px !important; /* Yüksekliği sabitledik (31 gün banko sığar) */
                border-bottom: 1px solid #f3f4f6 !important; 
            }
            
            .date-col { font-size: 9pt !important; color: #000 !important; }
            .day-name { font-size: 7.5pt !important; color: #4b5563 !important; }
            
            .shift-pill { 
                padding: 2px 0 !important; 
                font-size: 8.5pt !important; 
                height: auto !important;
                border-radius: 4px !important;
            }
        }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-6 no-print">
        <h2 class="text-xl font-bold mb-4 text-gray-800">Vardiya Ayarları</h2>
        
        <div class="flex flex-col sm:flex-row gap-3">
            <select id="monthSelect" class="flex-1 border border-gray-200 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-blue-400 outline-none font-semibold">
                <option value="0">Ocak</option><option value="1">Şubat</option><option value="2">Mart</option>
                <option value="3">Nisan</option><option value="4">Mayıs</option><option value="5">Haziran</option>
                <option value="6">Temmuz</option><option value="7">Ağustos</option><option value="8">Eylül</option>
                <option value="9">Ekim</option><option value="10">Kasım</option><option value="11">Aralık</option>
            </select>
            
            <select id="yearSelect" class="flex-1 border border-gray-200 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-blue-400 outline-none font-semibold"></select>
            
            <button onclick="generateTable()" class="bg-gray-800 hover:bg-black text-white font-bold py-3 px-6 rounded-lg transition-colors">
                Uygula
            </button>
            <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">
                PDF / Yazdır
            </button>
        </div>
        <p class="text-xs text-gray-500 mt-3 text-center">Değiştirmek istediğiniz vardiyanın üzerine dokunun.</p>
    </div>

    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-4 md:p-8 print-container">
        
        <div class="text-center header-area pb-4 mb-6 border-b border-gray-200">
            <h1 id="tableTitle" class="text-2xl font-bold text-gray-900 tracking-tight uppercase">AY YIL VARDİYASI</h1>
            <p class="subtitle text-sm text-gray-500 mt-1">Berkay, Kenan ve Ali</p>
        </div>

        <table class="w-full text-center">
            <thead>
                <tr>
                    <th class="py-3 px-2 text-left text-gray-600 font-bold border-b-2 border-gray-800 w-1/4">Tarih</th>
                    <th class="py-3 px-2 text-gray-600 font-bold border-b-2 border-gray-800 w-1/4">Berkay</th>
                    <th class="py-3 px-2 text-gray-600 font-bold border-b-2 border-gray-800 w-1/4">Kenan</th>
                    <th class="py-3 px-2 text-gray-600 font-bold border-b-2 border-gray-800 w-1/4">Ali</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script>
        const berkayCycle = ['SABAH', 'SABAH', 'GECE', 'GECE', 'İZİN', 'İZİN'];
        const kenanCycle = ['SABAH', 'SABAH', 'SABAH', 'SABAH', 'İZİN', 'İZİN'];
        const aliCycle = ['GECE', 'GECE', 'GECE', 'GECE', 'İZİN', 'İZİN'];

        const anchorBerkay = new Date(Date.UTC(2026, 5, 4));
        const anchorKenan = new Date(Date.UTC(2026, 5, 6)); 
        const anchorAli = new Date(Date.UTC(2026, 5, 2));   

        const ayIsimleri = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
        const gunIsimleri = ["Pazar", "Pzt", "Salı", "Çarş", "Perş", "Cuma", "Cmt"];

        window.onload = () => {
            const currentYear = new Date().getFullYear();
            const yearSelect = document.getElementById('yearSelect');
            for(let i = 2024; i <= currentYear + 5; i++) {
                let opt = document.createElement('option');
                opt.value = i; opt.innerHTML = i;
                if(i === currentYear) opt.selected = true;
                yearSelect.appendChild(opt);
            }
            document.getElementById('monthSelect').value = new Date().getMonth();
            generateTable();
        };

        function getShift(targetDate, anchorDate, cycleArray) {
            const msPerDay = 1000 * 60 * 60 * 24;
            const tDate = Date.UTC(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
            const diffDays = Math.floor((tDate - anchorDate) / msPerDay);
            let index = diffDays % 6;
            if (index < 0) index += 6; 
            return cycleArray[index];
        }

        function toggleShift(element) {
            let currentShift = element.getAttribute('data-shift');
            let nextShift = currentShift === 'GECE' ? 'SABAH' : currentShift === 'SABAH' ? 'İZİN' : 'GECE';
            
            element.setAttribute('data-shift', nextShift);
            element.className = `shift-pill ${nextShift}`;
            element.innerText = nextShift;
        }

        function generateTable() {
            const month = parseInt(document.getElementById('monthSelect').value);
            const year = parseInt(document.getElementById('yearSelect').value);
            
            document.getElementById('tableTitle').innerText = `${ayIsimleri[month]} ${year}`;
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 

            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let day = 1; day <= daysInMonth; day++) {
                const currentDate = new Date(year, month, day);
                const dayName = gunIsimleri[currentDate.getDay()];
                
                const bShift = getShift(currentDate, anchorBerkay, berkayCycle);
                const kShift = getShift(currentDate, anchorKenan, kenanCycle);
                const aShift = getShift(currentDate, anchorAli, aliCycle);

                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-100 hover:bg-gray-50";
                
                tr.innerHTML = `
                    <td class="py-2.5 px-2 text-left date-col font-bold">
                        ${day} <span class="day-name font-normal ml-1">${dayName}</span>
                    </td>
                    <td class="py-2 px-1">
                        <span class="shift-pill ${bShift}" data-shift="${bShift}" onclick="toggleShift(this)">${bShift}</span>
                    </td>
                    <td class="py-2 px-1">
                        <span class="shift-pill ${kShift}" data-shift="${kShift}" onclick="toggleShift(this)">${kShift}</span>
                    </td>
                    <td class="py-2 px-1">
                        <span class="shift-pill ${aShift}" data-shift="${aShift}" onclick="toggleShift(this)">${aShift}</span>
                    </td>
                `;
                tbody.appendChild(tr);
            }
        }
    </script>
</body>
</html>
