<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO-INT v10.0 | TOTAL CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="osint.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
</head>
<body class="bg-[#050505] text-white overflow-hidden font-mono text-[11px]">

    <div class="scanlines"></div>
    <div id="map" class="w-full h-screen z-0"></div>

    <div class="absolute inset-0 pointer-events-none z-10 flex flex-col justify-between p-4">
        
        <div class="flex justify-between items-start pointer-events-auto gap-4">
            <div class="glass-panel p-4 border-l-4 border-red-600 min-w-[320px]">
                <h1 class="text-2xl font-black tracking-widest text-red-600 italic">GEO-INT v10.0</h1>
                <p class="text-[9px] text-gray-500 uppercase">Operator: Berkay_Dev // Global_Monitor</p>
            </div>

            <div class="flex-1 max-w-xl">
                <div class="glass-panel p-2 flex gap-2 border-b-2 border-cyan-500">
                    <input type="text" id="searchInput" placeholder="HEDEF/ŞEHİR SORGULA..." class="bg-black/40 border-none text-cyan-400 text-xs p-2.5 w-full focus:outline-none">
                    <button onclick="searchLocation()" class="bg-cyan-900/30 px-5 text-cyan-400 hover:bg-cyan-500 transition-all font-bold uppercase text-[10px]">Analiz Et</button>
                </div>
            </div>
            
            <div class="glass-panel p-3 text-right">
                <div id="sysTime" class="text-2xl font-bold text-white tracking-tighter">00:00:00</div>
                <div class="text-[9px] text-cyan-500">AIR_SPACE_LINK: OK</div>
            </div>
        </div>

        <div class="absolute top-32 left-4 pointer-events-auto space-y-4 w-80">
            <div class="glass-panel p-4 border-t-2 border-green-500 shadow-2xl">
                <h3 class="text-[10px] font-bold text-green-500 mb-3 tracking-[3px] uppercase italic"><i class="fas fa-crosshairs mr-2"></i>Aktif Hedefler</h3>
                <div id="deviceList" class="space-y-2.5 max-h-[350px] overflow-y-auto pr-2 scrollbar-hide">
                    <div class="text-gray-600 italic text-center py-4">Sinyal taranıyor...</div>
                </div>
                <button onclick="generateTrackingLink()" class="mt-4 w-full bg-green-900/10 border border-green-500 p-2.5 text-[10px] hover:bg-green-500 hover:text-black transition-all font-black uppercase">Yeni Takip Linki</button>
            </div>
        </div>

        <div class="absolute top-32 right-4 pointer-events-auto w-48 space-y-2">
            <div class="glass-panel p-3 border-t-2 border-red-600">
                <h3 class="text-[9px] font-bold text-red-500 mb-2 uppercase italic text-center">Modül Kontrol</h3>
                <div class="space-y-2">
                    <button onclick="toggleLayer('traffic')" id="btn-traffic" class="ctrl-btn active">TRAFİK AKIŞI</button>
                    <button onclick="toggleLayer('flights')" id="btn-flights" class="ctrl-btn">UÇAK TAKİBİ</button>
                    <button onclick="toggleLayer('iss')" id="btn-iss" class="ctrl-btn active">ISS UYDU</button>
                    <button onclick="location.reload()" class="ctrl-btn text-red-500 border-red-900 text-center font-bold">RESET</button>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-end pointer-events-auto gap-4">
            <div class="glass-panel w-full md:w-1/2 p-3">
                <div id="dataFeed" class="text-[9px] h-24 overflow-y-auto space-y-1.5 scrollbar-hide font-mono"></div>
            </div>
        </div>
    </div>

    <div id="tacticModal" class="absolute inset-0 z-[3000] bg-black/95 hidden flex items-center justify-center pointer-events-auto">
        <div class="glass-panel p-8 max-w-sm w-full border-2 border-red-600 text-center space-y-5">
            <div class="text-red-600 text-4xl"><i id="modalIcon" class="fas fa-exclamation-triangle"></i></div>
            <h2 id="modalTitle" class="text-red-500 font-bold italic text-xs uppercase tracking-[3px]">SİSTEM UYARISI</h2>
            <p id="modalMsg" class="text-[12px] text-white font-mono leading-relaxed"></p>
            <div id="modalButtons" class="flex gap-4 justify-center pt-3"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="osint.js"></script>
</body>
</html>
