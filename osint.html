<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO-INT v6.7 | STRATEGIC COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="osint.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
</head>
<body class="bg-[#050505] text-white overflow-hidden">

    <div class="scanlines"></div>
    <div id="map" class="w-full h-screen z-0"></div>

    <div class="absolute inset-0 pointer-events-none z-10 flex flex-col justify-between p-4">
        <div class="flex justify-between items-start pointer-events-auto gap-4">
            <div class="glass-panel p-4 border-l-4 border-red-600 min-w-[300px]">
                <h1 class="text-xl font-black tracking-widest text-red-600">GEO-INT v6.7 // BERKAY_DEV</h1>
                <p class="text-[9px] text-gray-400 font-mono">STATION: TACTICAL_NODE_01</p>
            </div>

            <div class="flex-1 max-w-xl">
                <div class="glass-panel p-2 flex gap-2 border-b-2 border-cyan-500">
                    <input type="text" id="searchInput" placeholder="ADRES VEYA KOORDİNAT SORGULA..." class="bg-black/50 border-none text-cyan-400 text-xs p-2 w-full focus:outline-none font-mono">
                    <button onclick="searchLocation()" class="bg-cyan-900/30 px-4 text-cyan-400 hover:bg-cyan-500 transition-all">SORGULA</button>
                </div>
            </div>
            
            <div class="glass-panel p-3 text-right font-mono min-w-[150px]">
                <div id="sysTime" class="text-xl font-bold">00:00:00</div>
                <div class="text-[9px] text-cyan-500 tracking-tighter">GPS_LOCK: ACTIVE</div>
            </div>
        </div>

        <div class="absolute top-28 left-4 pointer-events-auto space-y-3 w-72">
            <div class="glass-panel p-3 border-t-2 border-green-500">
                <h3 class="text-[10px] font-bold text-green-500 mb-2"><i class="fas fa-microchip mr-2"></i>KAYITLI CİHAZLAR</h3>
                <div id="deviceList" class="space-y-2 max-h-48 overflow-y-auto pr-2 scrollbar-hide text-[10px]">
                    <div class="text-gray-600 italic text-center py-2">Aktif cihaz aranıyor...</div>
                </div>
                <button onclick="generateTrackingLink()" class="mt-3 w-full bg-green-900/20 border border-green-500/50 p-2 text-[9px] hover:bg-green-500 hover:text-black transition-all">TAKİP LİNKİ OLUŞTUR</button>
            </div>

            <div class="glass-panel p-3 border-t-2 border-cyan-500">
                <h3 class="text-[10px] font-bold text-cyan-500 mb-2"><i class="fas fa-crosshairs mr-2"></i>OPERATÖR KONUMU</h3>
                <button onclick="getMyLocation()" class="w-full bg-cyan-900/20 border border-cyan-500/50 p-2 text-[9px] hover:bg-cyan-500 transition-all font-bold">KONUMU TESPİT ET</button>
            </div>
        </div>

        <div class="flex justify-between items-end pointer-events-auto gap-4">
            <div class="glass-panel w-full md:w-1/3 p-3">
                <div id="dataFeed" class="text-[9px] font-mono h-24 overflow-y-auto space-y-1"></div>
            </div>

            <div class="glass-panel p-3 grid grid-cols-2 gap-2">
                <button onclick="toggleLayer('traffic')" id="btn-traffic" class="ctrl-btn active">TRAFİK AKIŞI</button>
                <button onclick="toggleLayer('incidents')" id="btn-incidents" class="ctrl-btn">YOL OLAYLARI</button>
                <button onclick="toggleLayer('earthquake')" id="btn-earthquake" class="ctrl-btn">SİSMİK TAKİP</button>
                <button onclick="location.reload()" class="ctrl-btn text-red-500 border-red-900">ACİL SIFIRLAMA</button>
            </div>
        </div>
    </div>

    <div id="linkModal" class="absolute inset-0 z-[2000] bg-black/90 hidden flex items-center justify-center pointer-events-auto">
        <div class="glass-panel p-6 max-w-md w-full border-2 border-green-500">
            <h2 class="text-green-500 font-bold mb-4 italic">GENERATE_TRACKING_URL</h2>
            <input type="text" id="generatedLink" readonly class="w-full bg-black p-2 text-[10px] text-green-400 border border-green-900 mb-4 font-mono text-center">
            <button onclick="document.getElementById('linkModal').classList.add('hidden')" class="w-full border border-green-500 p-2 text-xs hover:bg-green-500 hover:text-black transition-all">TERMİNALİ KAPAT</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="osint.js"></script>
</body>
</html>
